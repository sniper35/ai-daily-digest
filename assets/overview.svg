<svg xmlns="http://www.w3.org/2000/svg" width="1366" height="768" viewBox="0 0 1366 768" role="img" aria-labelledby="title desc">
  <title id="title">AI Daily Digest overview</title>
  <desc id="desc">Pipeline from RSS feeds to filtering, scoring, summaries, and trend highlights.</desc>
  <rect width="1366" height="768" fill="#f6f7fb"/>
  <text x="84" y="104" fill="#f97316" font-family="Inter, Arial, sans-serif" font-size="48" font-weight="700">AI Daily Digest</text>
  <text x="84" y="164" fill="#111827" font-family="Inter, Arial, sans-serif" font-size="44" font-weight="700">Curated technology reads from RSS feeds</text>
  <text x="84" y="214" fill="#374151" font-family="Inter, Arial, sans-serif" font-size="26">AI-ranked summaries for engineers, researchers, and technical readers</text>

  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="14" flood-color="#000000" flood-opacity="0.12"/>
    </filter>
    <marker id="arrow" markerWidth="16" markerHeight="16" refX="10" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L10,5 L0,10 Z" fill="#f97316"/>
    </marker>
  </defs>

  <g font-family="Inter, Arial, sans-serif" text-anchor="middle">
    <g transform="translate(84 276)" filter="url(#shadow)">
      <rect width="200" height="220" rx="18" fill="#ffffff"/>
      <text x="100" y="82" font-size="56" fill="#f97316">RSS</text>
      <text x="100" y="134" font-size="28" font-weight="700" fill="#111827">Fetch</text>
      <text x="100" y="174" font-size="20" fill="#374151">Parallel feed reads</text>
    </g>

    <line x1="304" y1="386" x2="366" y2="386" stroke="#f97316" stroke-width="12" marker-end="url(#arrow)"/>

    <g transform="translate(386 276)" filter="url(#shadow)">
      <rect width="200" height="220" rx="18" fill="#ffffff"/>
      <text x="100" y="82" font-size="56" fill="#f97316">24h</text>
      <text x="100" y="134" font-size="28" font-weight="700" fill="#111827">Filter</text>
      <text x="100" y="174" font-size="20" fill="#374151">Keep recent posts</text>
    </g>

    <line x1="606" y1="386" x2="668" y2="386" stroke="#f97316" stroke-width="12" marker-end="url(#arrow)"/>

    <g transform="translate(688 276)" filter="url(#shadow)">
      <rect width="200" height="220" rx="18" fill="#ffffff"/>
      <text x="100" y="82" font-size="56" fill="#f97316">AI</text>
      <text x="100" y="134" font-size="28" font-weight="700" fill="#111827">Score</text>
      <text x="100" y="174" font-size="20" fill="#374151">Rank and classify</text>
    </g>

    <line x1="908" y1="386" x2="970" y2="386" stroke="#f97316" stroke-width="12" marker-end="url(#arrow)"/>

    <g transform="translate(990 276)" filter="url(#shadow)">
      <rect width="200" height="220" rx="18" fill="#ffffff"/>
      <text x="100" y="82" font-size="56" fill="#f97316">MD</text>
      <text x="100" y="134" font-size="28" font-weight="700" fill="#111827">Summarize</text>
      <text x="100" y="174" font-size="20" fill="#374151">Write digest entries</text>
    </g>
  </g>

  <g font-family="Inter, Arial, sans-serif" font-size="22" font-weight="700" fill="#374151">
    <rect x="84" y="586" width="198" height="48" rx="24" fill="#ffffff" stroke="#f97316" stroke-width="3"/>
    <text x="183" y="618" text-anchor="middle">English output</text>

    <rect x="306" y="586" width="198" height="48" rx="24" fill="#ffffff" stroke="#f97316" stroke-width="3"/>
    <text x="405" y="618" text-anchor="middle">Mermaid charts</text>

    <rect x="528" y="586" width="198" height="48" rx="24" fill="#ffffff" stroke="#f97316" stroke-width="3"/>
    <text x="627" y="618" text-anchor="middle">Tag cloud</text>

    <rect x="750" y="586" width="198" height="48" rx="24" fill="#ffffff" stroke="#f97316" stroke-width="3"/>
    <text x="849" y="618" text-anchor="middle">Saved config</text>
  </g>
</svg>
